<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R:\ Drive Portal</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f1117;
    --surface:  #1a1d27;
    --surface2: #222536;
    --border:   #2e3250;
    --accent:   #5b7cfa;
    --accent2:  #7c5bfa;
    --text:     #e2e5f1;
    --muted:    #6b7280;
    --green:    #34d399;
    --yellow:   #fbbf24;
    --red:      #f87171;
    --purple:   #a78bfa;
    --orange:   #fb923c;

    --cat-document: #5b7cfa;
    --cat-text:     #34d399;
    --cat-code:     #a78bfa;
    --cat-skip:     #374151;
    --cat-other:    #fb923c;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Top bar ── */
  .topbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
  }
  .logo { font-weight: 700; font-size: 15px; color: var(--accent); white-space: nowrap; }
  .search-wrap {
    flex: 1;
    position: relative;
    max-width: 700px;
  }
  .search-wrap svg {
    position: absolute; left: 12px; top: 50%;
    transform: translateY(-50%); color: var(--muted); pointer-events: none;
  }
  #search {
    width: 100%; padding: 9px 12px 9px 38px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px; outline: none;
    transition: border-color .15s;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }
  .topbar-right { display: flex; align-items: center; gap: 10px; margin-left: auto; }
  .stat-pill {
    font-size: 11px; color: var(--muted); background: var(--surface2);
    border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px;
    white-space: nowrap;
  }
  .stat-pill span { color: var(--text); font-weight: 600; }
  .icon-btn {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 8px; cursor: pointer; color: var(--muted);
    display: flex; align-items: center; gap: 5px; font-size: 12px;
    transition: color .15s, border-color .15s;
  }
  .icon-btn:hover { color: var(--text); border-color: var(--accent); }
  .icon-btn.active { color: var(--accent); border-color: var(--accent); }

  /* ── Layout ── */
  .body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sidebar-tab {
    flex: 1; padding: 10px 6px; font-size: 12px; font-weight: 600;
    text-align: center; cursor: pointer; color: var(--muted);
    border-bottom: 2px solid transparent; transition: color .15s;
  }
  .sidebar-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .sidebar-content { flex: 1; overflow-y: auto; padding: 12px; }

  .filter-group { margin-bottom: 18px; }
  .filter-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .08em; color: var(--muted); margin-bottom: 8px;
  }
  .cat-filters { display: flex; flex-direction: column; gap: 4px; }
  .cat-chip {
    display: flex; align-items: center; gap: 8px; padding: 5px 8px;
    border-radius: 6px; cursor: pointer; border: 1px solid transparent;
    transition: background .12s;
  }
  .cat-chip:hover { background: var(--surface2); }
  .cat-chip.active { background: var(--surface2); border-color: var(--border); }
  .cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .cat-chip-name { font-size: 13px; flex: 1; }
  .cat-chip-count { font-size: 11px; color: var(--muted); }

  .ext-list { display: flex; flex-direction: column; gap: 2px; }
  .ext-item {
    display: flex; align-items: center; gap: 8px; padding: 4px 6px;
    border-radius: 5px; cursor: pointer; font-size: 12px;
    transition: background .12s;
  }
  .ext-item:hover, .ext-item.active { background: var(--surface2); }
  .ext-item.active { color: var(--accent); }
  .ext-name { flex: 1; font-family: monospace; }
  .ext-count { color: var(--muted); font-size: 11px; }
  .ext-bar {
    height: 3px; background: var(--accent); border-radius: 2px;
    margin-top: 2px; opacity: .5;
  }

  /* Folder tree */
  .tree-node { }
  .tree-row {
    display: flex; align-items: center; gap: 4px; padding: 3px 4px;
    border-radius: 4px; cursor: pointer; font-size: 12px;
    transition: background .1s; white-space: nowrap; overflow: hidden;
  }
  .tree-row:hover { background: var(--surface2); }
  .tree-row.active { background: var(--surface2); color: var(--accent); }
  .tree-toggle { width: 14px; flex-shrink: 0; color: var(--muted); font-size: 10px; }
  .tree-icon { flex-shrink: 0; }
  .tree-name { overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .tree-cnt { font-size: 10px; color: var(--muted); flex-shrink: 0; }
  .tree-children { padding-left: 14px; }
  .tree-children.hidden { display: none; }

  /* Collections */
  .coll-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .coll-list { display: flex; flex-direction: column; gap: 6px; }
  .coll-item {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 10px; cursor: pointer;
    transition: border-color .12s;
  }
  .coll-item:hover { border-color: var(--accent); }
  .coll-item.active { border-color: var(--accent); }
  .coll-item-name { font-size: 13px; font-weight: 600; }
  .coll-item-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .coll-empty { font-size: 12px; color: var(--muted); text-align: center; padding: 20px 0; }

  /* ── Main area ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .toolbar {
    display: flex; align-items: center; gap: 10px; padding: 10px 16px;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
    background: var(--surface);
  }
  .result-count { font-size: 12px; color: var(--muted); }
  .result-count span { color: var(--text); font-weight: 600; }
  .spacer { flex: 1; }
  .sort-select {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 12px;
    padding: 5px 8px; outline: none; cursor: pointer;
  }
  .active-filters { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-tag {
    display: flex; align-items: center; gap: 4px; padding: 2px 8px;
    background: var(--surface2); border: 1px solid var(--accent);
    border-radius: 20px; font-size: 11px; color: var(--accent); cursor: pointer;
  }
  .filter-tag:hover { background: var(--border); }

  .results-area {
    flex: 1; overflow-y: auto; padding: 12px 16px;
  }

  /* ── File cards ── */
  .file-list { display: flex; flex-direction: column; gap: 4px; }
  .file-card {
    display: flex; align-items: center; gap: 12px; padding: 9px 12px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 7px; cursor: pointer; transition: border-color .12s, background .12s;
    position: relative;
  }
  .file-card:hover { border-color: var(--accent); background: var(--surface2); }
  .file-card.selected { border-color: var(--accent); background: var(--surface2); }
  .file-card.in-collection { border-left: 3px solid var(--green); }

  .file-icon {
    width: 32px; height: 32px; border-radius: 6px; display: flex;
    align-items: center; justify-content: center; font-size: 14px;
    flex-shrink: 0; font-weight: 700;
  }
  .file-info { flex: 1; min-width: 0; }
  .file-name {
    font-size: 13px; font-weight: 600; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .file-name mark {
    background: transparent; color: var(--accent); font-weight: 700;
  }
  .file-path {
    font-size: 11px; color: var(--muted); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; margin-top: 2px;
  }
  .file-path mark { background: transparent; color: var(--muted); font-weight: 600; }
  .file-meta {
    display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  .file-size { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .file-date { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .cat-badge {
    font-size: 10px; font-weight: 700; padding: 2px 6px;
    border-radius: 4px; color: white; white-space: nowrap;
  }
  .file-actions {
    display: flex; gap: 6px; flex-shrink: 0;
  }
  .action-btn {
    opacity: 0; padding: 4px 8px; border-radius: 5px; font-size: 11px;
    cursor: pointer; border: 1px solid var(--border); background: var(--surface2);
    color: var(--text); transition: opacity .1s, border-color .12s;
    white-space: nowrap;
  }
  .file-card:hover .action-btn { opacity: 1; }
  .action-btn:hover { border-color: var(--accent); color: var(--accent); }
  .action-btn.add-coll { }

  .load-more {
    margin: 16px auto; display: block; padding: 9px 24px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 13px; cursor: pointer;
    transition: border-color .12s;
  }
  .load-more:hover { border-color: var(--accent); }

  /* ── Detail panel ── */
  .detail-panel {
    width: 0; overflow: hidden; background: var(--surface);
    border-left: 1px solid var(--border); flex-shrink: 0;
    transition: width .2s; display: flex; flex-direction: column;
  }
  .detail-panel.open { width: 300px; }
  .detail-inner { padding: 16px; width: 300px; overflow-y: auto; flex: 1; }
  .detail-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; word-break: break-all; }
  .detail-path {
    font-size: 11px; color: var(--muted); word-break: break-all;
    margin-bottom: 16px; line-height: 1.5;
  }
  .detail-row {
    display: flex; justify-content: space-between; padding: 6px 0;
    border-bottom: 1px solid var(--border); font-size: 12px;
  }
  .detail-key { color: var(--muted); }
  .detail-val { font-weight: 600; text-align: right; }
  .detail-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
  .detail-btn {
    padding: 8px 12px; border-radius: 7px; font-size: 13px; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface2); color: var(--text);
    text-align: center; text-decoration: none; display: block;
    transition: border-color .12s;
  }
  .detail-btn:hover { border-color: var(--accent); color: var(--accent); }
  .detail-btn.primary {
    background: var(--accent); color: white; border-color: var(--accent);
    font-weight: 600;
  }
  .detail-btn.primary:hover { background: #4a6ae0; }

  /* ── Loading overlay ── */
  .loading {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; z-index: 100;
  }
  .loading-spinner {
    width: 40px; height: 40px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--muted); font-size: 14px; }

  /* ── Modal ── */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,.6);
    display: none; align-items: center; justify-content: center; z-index: 200;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 24px; width: 360px; max-width: 90vw;
  }
  .modal h3 { margin-bottom: 16px; font-size: 16px; }
  .modal input {
    width: 100%; padding: 9px 12px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 7px; color: var(--text);
    font-size: 14px; outline: none; margin-bottom: 12px;
  }
  .modal input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .btn {
    padding: 8px 16px; border-radius: 7px; font-size: 13px; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface2); color: var(--text);
    transition: border-color .12s;
  }
  .btn:hover { border-color: var(--accent); }
  .btn.primary { background: var(--accent); color: white; border-color: var(--accent); font-weight: 600; }
  .btn.primary:hover { background: #4a6ae0; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 60px 20px; color: var(--muted); gap: 12px;
  }
  .empty-state svg { opacity: .3; }
  .empty-state p { font-size: 14px; }
</style>
</head>
<body>

<!-- Loading -->
<div class="loading" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">Loading file index…</div>
</div>

<!-- New Collection Modal -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3>New Collection</h3>
    <input id="coll-name-input" placeholder="Collection name…" />
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="createCollection()">Create</button>
    </div>
  </div>
</div>

<!-- Add to collection modal -->
<div class="modal-bg" id="add-modal-bg">
  <div class="modal">
    <h3>Add to Collection</h3>
    <div id="add-coll-list" style="display:flex;flex-direction:column;gap:6px;margin-bottom:12px;max-height:200px;overflow-y:auto;"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeAddModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- Top bar -->
<div class="topbar">
  <div class="logo">R:\ Portal</div>
  <div class="search-wrap">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="search" type="text" placeholder="Search files and folders… (press / to focus)" autocomplete="off" spellcheck="false" />
  </div>
  <div class="topbar-right">
    <div class="stat-pill" id="stat-total">Loading…</div>
    <div class="stat-pill" id="stat-embed"></div>
    <button class="icon-btn" id="btn-grid" title="Grid view" onclick="setView('grid')">
      <svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
        <path d="M1 2a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V2zm5 0a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V2zm5 0a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1h-2a1 1 0 0 1-1-1V2zM1 7a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V7zm5 0a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V7zm5 0a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1h-2a1 1 0 0 1-1-1V7zM1 12a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1v-2zm5 0a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1v-2zm5 0a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1h-2a1 1 0 0 1-1-1v-2z"/>
      </svg>
    </button>
    <button class="icon-btn active" id="btn-list" title="List view" onclick="setView('list')">
      <svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
        <path d="M2 4h12v1H2zm0 4h12v1H2zm0 4h12v1H2z" stroke="currentColor" stroke-width=".5"/>
      </svg>
    </button>
  </div>
</div>

<!-- Body -->
<div class="body">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-tabs">
      <div class="sidebar-tab active" data-tab="filters" onclick="switchTab('filters')">Filters</div>
      <div class="sidebar-tab" data-tab="folders" onclick="switchTab('folders')">Folders</div>
      <div class="sidebar-tab" data-tab="collections" onclick="switchTab('collections')">Collections</div>
    </div>

    <!-- Filters tab -->
    <div class="sidebar-content" id="tab-filters">
      <div class="filter-group">
        <div class="filter-label">Category</div>
        <div class="cat-filters" id="cat-filters"></div>
      </div>
      <div class="filter-group">
        <div class="filter-label">File Type</div>
        <div class="ext-list" id="ext-list"></div>
      </div>
      <div class="filter-group">
        <div class="filter-label">Size</div>
        <div style="display:flex;flex-direction:column;gap:6px">
          <label style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="checkbox" id="filter-large" onchange="applyFilters()"> Large files only (&gt;50MB)
          </label>
          <label style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="checkbox" id="filter-embeddable" onchange="applyFilters()"> Embeddable only
          </label>
        </div>
      </div>
    </div>

    <!-- Folders tab -->
    <div class="sidebar-content" id="tab-folders" style="display:none">
      <div id="folder-tree"></div>
    </div>

    <!-- Collections tab -->
    <div class="sidebar-content" id="tab-collections" style="display:none">
      <div class="coll-header">
        <div class="filter-label" style="margin:0">My Collections</div>
        <button class="icon-btn" onclick="openModal()" style="font-size:11px;padding:4px 8px">+ New</button>
      </div>
      <div class="coll-list" id="coll-list"></div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="toolbar">
      <div class="result-count" id="result-count"></div>
      <div class="active-filters" id="active-filters"></div>
      <div class="spacer"></div>
      <select class="sort-select" id="sort-select" onchange="applyFilters()">
        <option value="name">Sort: Name</option>
        <option value="size_desc">Sort: Size ↓</option>
        <option value="size_asc">Sort: Size ↑</option>
        <option value="date_desc">Sort: Date ↓</option>
        <option value="date_asc">Sort: Date ↑</option>
      </select>
      <button class="icon-btn" id="btn-clear" onclick="clearFilters()" style="display:none">Clear all</button>
    </div>

    <div class="results-area" id="results-area">
      <div class="file-list" id="file-list"></div>
      <button class="load-more" id="load-more" onclick="loadMore()" style="display:none">Load more</button>
    </div>
  </div>

  <!-- Detail panel -->
  <div class="detail-panel" id="detail-panel">
    <div class="detail-inner" id="detail-inner"></div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let allFiles = [];
let filtered = [];
let displayed = 0;
const PAGE = 100;

let activeCategories = new Set();
let activeExtensions = new Set();
let activeFolder = null;
let activeCollection = null;
let filterLarge = false;
let filterEmbeddable = false;
let currentView = 'list';
let selectedFile = null;
let pendingAddFile = null;

let collections = JSON.parse(localStorage.getItem('portal_collections') || '{}');
// collections: { name: { files: [path, ...], created: iso } }

const CAT_COLORS = {
  document: '#5b7cfa', text: '#34d399', code: '#a78bfa',
  skip: '#374151', other: '#fb923c'
};
const CAT_ICONS = {
  document: '📄', text: '📝', code: '💻', skip: '⊘', other: '📦'
};
const EXT_ICONS = {
  '.pdf': '📕', '.doc': '📘', '.docx': '📘', '.xls': '📗', '.xlsx': '📗',
  '.ppt': '📙', '.pptx': '📙', '.txt': '📝', '.md': '📋', '.csv': '📊',
  '.py': '🐍', '.js': '🟨', '.ts': '🔷', '.html': '🌐', '.json': '🔧',
  '.sql': '🗄', '.sh': '⚙', '.bat': '⚙', '.ps1': '⚙',
};

// ── Load data ──────────────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch('/output/file_index.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    allFiles = await res.json();
  } catch (e) {
    document.getElementById('loading').innerHTML =
      `<div style="color:var(--red);font-size:14px;text-align:center;padding:20px">
        Failed to load file_index.json<br>
        <span style="color:var(--muted);font-size:12px">Run the scanner first: python scanner/scan.py</span>
      </div>`;
    return;
  }

  document.getElementById('loading').style.display = 'none';
  buildStats();
  buildCatFilters();
  buildExtList();
  buildFolderTree();
  renderCollections();
  applyFilters();
  setupKeyboard();
}

// ── Stats bar ──────────────────────────────────────────────────────────────
function buildStats() {
  const total = allFiles.length;
  const embed = allFiles.filter(f => f.embeddable);
  const totalSize = allFiles.reduce((s, f) => s + f.size_bytes, 0);
  document.getElementById('stat-total').innerHTML =
    `<span>${total.toLocaleString()}</span> files · ${fmtSize(totalSize)}`;
  document.getElementById('stat-embed').innerHTML =
    `<span style="color:var(--green)">${embed.length.toLocaleString()}</span> embeddable · ${fmtSize(embed.reduce((s,f) => s+f.size_bytes, 0))}`;
}

// ── Category filters ───────────────────────────────────────────────────────
function buildCatFilters() {
  const counts = {};
  allFiles.forEach(f => { counts[f.category] = (counts[f.category]||0)+1; });
  const el = document.getElementById('cat-filters');
  el.innerHTML = '';
  Object.entries(counts).sort((a,b) => b[1]-a[1]).forEach(([cat, cnt]) => {
    const div = document.createElement('div');
    div.className = 'cat-chip';
    div.dataset.cat = cat;
    div.innerHTML = `
      <div class="cat-dot" style="background:${CAT_COLORS[cat]||'#666'}"></div>
      <div class="cat-chip-name">${CAT_ICONS[cat]||''} ${cat}</div>
      <div class="cat-chip-count">${cnt.toLocaleString()}</div>`;
    div.onclick = () => toggleCategory(cat, div);
    el.appendChild(div);
  });
}

function toggleCategory(cat, el) {
  if (activeCategories.has(cat)) {
    activeCategories.delete(cat);
    el.classList.remove('active');
  } else {
    activeCategories.add(cat);
    el.classList.add('active');
  }
  applyFilters();
}

// ── Extension list ─────────────────────────────────────────────────────────
function buildExtList() {
  const counts = {};
  allFiles.forEach(f => { if(f.ext) counts[f.ext] = (counts[f.ext]||0)+1; });
  const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,30);
  const max = sorted[0]?.[1] || 1;
  const el = document.getElementById('ext-list');
  el.innerHTML = '';
  sorted.forEach(([ext, cnt]) => {
    const div = document.createElement('div');
    div.className = 'ext-item';
    div.dataset.ext = ext;
    div.innerHTML = `
      <span class="ext-name">${ext}</span>
      <span class="ext-count">${cnt.toLocaleString()}</span>`;
    div.onclick = () => toggleExt(ext, div);
    el.appendChild(div);
  });
}

function toggleExt(ext, el) {
  if (activeExtensions.has(ext)) {
    activeExtensions.delete(ext);
    el.classList.remove('active');
  } else {
    activeExtensions.add(ext);
    el.classList.add('active');
  }
  applyFilters();
}

// ── Folder tree ────────────────────────────────────────────────────────────
function buildFolderTree() {
  const tree = {};
  allFiles.forEach(f => {
    const parts = f.path.replace(/\\/g, '/').split('/');
    let node = tree;
    for (let i = 1; i < parts.length - 1; i++) {
      const p = parts[i];
      if (!node[p]) node[p] = { _count: 0, _path: parts.slice(0, i+1).join('/') };
      node[p]._count++;
      node = node[p];
    }
  });

  const el = document.getElementById('folder-tree');
  el.innerHTML = '';

  // "All" option
  const allRow = document.createElement('div');
  allRow.className = 'tree-row active';
  allRow.innerHTML = `<span class="tree-icon">🖥</span><span class="tree-name">All files</span>`;
  allRow.onclick = () => { activeFolder = null; setActiveTreeRow(allRow); applyFilters(); };
  el.appendChild(allRow);

  function renderNode(node, parent, depth) {
    const keys = Object.keys(node).filter(k => !k.startsWith('_')).sort();
    keys.forEach(key => {
      const child = node[key];
      const wrapper = document.createElement('div');
      wrapper.className = 'tree-node';

      const row = document.createElement('div');
      row.className = 'tree-row';
      row.style.paddingLeft = (depth * 14 + 4) + 'px';
      const hasChildren = Object.keys(child).filter(k=>!k.startsWith('_')).length > 0;

      row.innerHTML = `
        <span class="tree-toggle">${hasChildren ? '▶' : ''}</span>
        <span class="tree-icon">📁</span>
        <span class="tree-name">${key}</span>
        <span class="tree-cnt">${child._count}</span>`;

      let expanded = false;
      const childrenEl = document.createElement('div');
      childrenEl.className = 'tree-children hidden';

      row.onclick = (e) => {
        e.stopPropagation();
        // toggle expand
        if (hasChildren) {
          expanded = !expanded;
          childrenEl.classList.toggle('hidden', !expanded);
          row.querySelector('.tree-toggle').textContent = expanded ? '▼' : '▶';
          if (expanded && childrenEl.children.length === 0) {
            renderNode(child, childrenEl, depth + 1);
          }
        }
        // set folder filter
        activeFolder = child._path;
        setActiveTreeRow(row);
        applyFilters();
      };

      wrapper.appendChild(row);
      wrapper.appendChild(childrenEl);
      parent.appendChild(wrapper);
    });
  }

  renderNode(tree, el, 0);

  function setActiveTreeRow(active) {
    document.querySelectorAll('.tree-row').forEach(r => r.classList.remove('active'));
    active.classList.add('active');
  }
}

// ── Filtering & sorting ────────────────────────────────────────────────────
function applyFilters() {
  const query = document.getElementById('search').value.trim().toLowerCase();
  filterLarge = document.getElementById('filter-large').checked;
  filterEmbeddable = document.getElementById('filter-embeddable').checked;
  const sort = document.getElementById('sort-select').value;

  let files = allFiles;

  // collection filter
  if (activeCollection) {
    const paths = new Set(collections[activeCollection]?.files || []);
    files = files.filter(f => paths.has(f.path));
  }

  // category filter
  if (activeCategories.size > 0) {
    files = files.filter(f => activeCategories.has(f.category));
  }

  // extension filter
  if (activeExtensions.size > 0) {
    files = files.filter(f => activeExtensions.has(f.ext));
  }

  // folder filter
  if (activeFolder) {
    const prefix = activeFolder.toLowerCase();
    files = files.filter(f => f.path.toLowerCase().replace(/\\/g,'/').startsWith(prefix));
  }

  // flags
  if (filterLarge) files = files.filter(f => f.large_file);
  if (filterEmbeddable) files = files.filter(f => f.embeddable);

  // search
  if (query) {
    files = files.filter(f =>
      f.name.toLowerCase().includes(query) ||
      f.path.toLowerCase().includes(query)
    );
    // score: name match ranks higher
    files.sort((a, b) => {
      const an = a.name.toLowerCase().startsWith(query) ? 1 : 0;
      const bn = b.name.toLowerCase().startsWith(query) ? 1 : 0;
      return bn - an;
    });
  } else {
    // apply sort
    files = [...files];
    if (sort === 'name') files.sort((a,b) => a.name.localeCompare(b.name));
    else if (sort === 'size_desc') files.sort((a,b) => b.size_bytes - a.size_bytes);
    else if (sort === 'size_asc') files.sort((a,b) => a.size_bytes - b.size_bytes);
    else if (sort === 'date_desc') files.sort((a,b) => (b.modified||'').localeCompare(a.modified||''));
    else if (sort === 'date_asc') files.sort((a,b) => (a.modified||'').localeCompare(b.modified||''));
  }

  filtered = files;
  displayed = 0;
  document.getElementById('file-list').innerHTML = '';
  updateResultCount();
  updateActiveFilterTags();
  loadMore();
}

function updateResultCount() {
  const el = document.getElementById('result-count');
  el.innerHTML = `<span>${filtered.length.toLocaleString()}</span> results`;
}

function updateActiveFilterTags() {
  const el = document.getElementById('active-filters');
  el.innerHTML = '';
  const addTag = (label, onRemove) => {
    const tag = document.createElement('div');
    tag.className = 'filter-tag';
    tag.innerHTML = `${label} ✕`;
    tag.onclick = onRemove;
    el.appendChild(tag);
  };
  activeCategories.forEach(cat => addTag(cat, () => {
    activeCategories.delete(cat);
    document.querySelector(`.cat-chip[data-cat="${cat}"]`)?.classList.remove('active');
    applyFilters();
  }));
  activeExtensions.forEach(ext => addTag(ext, () => {
    activeExtensions.delete(ext);
    document.querySelector(`.ext-item[data-ext="${ext}"]`)?.classList.remove('active');
    applyFilters();
  }));
  if (activeFolder) addTag('📁 ' + activeFolder.split('/').pop(), () => {
    activeFolder = null;
    document.querySelectorAll('.tree-row').forEach(r => r.classList.remove('active'));
    document.querySelector('.tree-row')?.classList.add('active');
    applyFilters();
  });
  if (filterLarge) addTag('Large files', () => { document.getElementById('filter-large').checked = false; applyFilters(); });
  if (filterEmbeddable) addTag('Embeddable', () => { document.getElementById('filter-embeddable').checked = false; applyFilters(); });
  if (activeCollection) addTag('📂 ' + activeCollection, () => { activeCollection = null; renderCollections(); applyFilters(); });

  const hasFilters = el.children.length > 0 || document.getElementById('search').value;
  document.getElementById('btn-clear').style.display = hasFilters ? '' : 'none';
}

function clearFilters() {
  activeCategories.clear();
  activeExtensions.clear();
  activeFolder = null;
  activeCollection = null;
  filterLarge = false;
  filterEmbeddable = false;
  document.getElementById('search').value = '';
  document.getElementById('filter-large').checked = false;
  document.getElementById('filter-embeddable').checked = false;
  document.querySelectorAll('.cat-chip').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.ext-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tree-row').forEach(r => r.classList.remove('active'));
  document.querySelector('.tree-row')?.classList.add('active');
  renderCollections();
  applyFilters();
}

// ── Render results ─────────────────────────────────────────────────────────
function loadMore() {
  const batch = filtered.slice(displayed, displayed + PAGE);
  const list = document.getElementById('file-list');
  const query = document.getElementById('search').value.trim().toLowerCase();

  batch.forEach(f => {
    const card = document.createElement('div');
    card.className = 'file-card' + (isInAnyCollection(f.path) ? ' in-collection' : '');
    if (selectedFile?.path === f.path) card.classList.add('selected');

    const color = CAT_COLORS[f.category] || '#666';
    const icon = EXT_ICONS[f.ext] || CAT_ICONS[f.category] || '📄';
    const nameHl = highlight(f.name, query);
    const pathHl = highlight(f.path, query);
    const badge = `<span class="cat-badge" style="background:${color}">${f.category}</span>`;

    card.innerHTML = `
      <div class="file-icon" style="background:${color}22;color:${color}">${icon}</div>
      <div class="file-info">
        <div class="file-name">${nameHl}</div>
        <div class="file-path">${pathHl}</div>
      </div>
      <div class="file-meta">
        ${badge}
        <div class="file-size">${f.size_human}</div>
        <div class="file-date">${f.modified ? f.modified.slice(0,10) : '—'}</div>
      </div>
      <div class="file-actions">
        <button class="action-btn add-coll" title="Add to collection">＋ Collect</button>
        <a class="action-btn" href="file:///${f.path.replace(/\\/g,'/')}" target="_blank" title="Open file">Open ↗</a>
      </div>`;

    card.querySelector('.add-coll').onclick = (e) => { e.stopPropagation(); openAddModal(f); };
    card.onclick = () => showDetail(f, card);
    list.appendChild(card);
  });

  displayed += batch.length;
  const loadMoreBtn = document.getElementById('load-more');
  loadMoreBtn.style.display = displayed < filtered.length ? '' : 'none';
  if (displayed < filtered.length) {
    loadMoreBtn.textContent = `Load more (${(filtered.length - displayed).toLocaleString()} remaining)`;
  }
}

function highlight(text, query) {
  if (!query) return text;
  const idx = text.toLowerCase().indexOf(query);
  if (idx === -1) return text;
  return text.slice(0, idx) +
    `<mark>${text.slice(idx, idx + query.length)}</mark>` +
    text.slice(idx + query.length);
}

function isInAnyCollection(path) {
  return Object.values(collections).some(c => c.files.includes(path));
}

// ── Detail panel ───────────────────────────────────────────────────────────
function showDetail(f, card) {
  document.querySelectorAll('.file-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');
  selectedFile = f;

  const panel = document.getElementById('detail-panel');
  const inner = document.getElementById('detail-inner');
  panel.classList.add('open');

  const color = CAT_COLORS[f.category] || '#666';
  const fileUrl = `file:///${f.path.replace(/\\/g, '/')}`;
  const folderUrl = `file:///${f.path.replace(/\\/g, '/').split('/').slice(0,-1).join('/')}`;

  const collNames = Object.entries(collections)
    .filter(([n, c]) => c.files.includes(f.path))
    .map(([n]) => n);

  inner.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <span class="cat-badge" style="background:${color}">${f.category}</span>
      <button class="icon-btn" onclick="closeDetail()" style="padding:4px 8px;font-size:12px">✕</button>
    </div>
    <div class="detail-title">${f.name}</div>
    <div class="detail-path">${f.path}</div>
    <div class="detail-row"><span class="detail-key">Size</span><span class="detail-val">${f.size_human}</span></div>
    <div class="detail-row"><span class="detail-key">Extension</span><span class="detail-val"><code>${f.ext || '—'}</code></span></div>
    <div class="detail-row"><span class="detail-key">Modified</span><span class="detail-val">${f.modified ? f.modified.slice(0,10) : '—'}</span></div>
    <div class="detail-row"><span class="detail-key">Embeddable</span><span class="detail-val" style="color:${f.embeddable?'var(--green)':'var(--muted)'}">${f.embeddable ? 'Yes' : 'No'}</span></div>
    ${f.large_file ? `<div class="detail-row"><span class="detail-key">Large file</span><span class="detail-val" style="color:var(--yellow)">⚠ >50MB</span></div>` : ''}
    ${collNames.length ? `<div class="detail-row"><span class="detail-key">Collections</span><span class="detail-val" style="color:var(--green)">${collNames.join(', ')}</span></div>` : ''}
    <div class="detail-actions">
      <a class="detail-btn primary" href="${fileUrl}" target="_blank">Open file ↗</a>
      <a class="detail-btn" href="${folderUrl}" target="_blank">Open folder ↗</a>
      <button class="detail-btn" onclick="openAddModal(selectedFile)">＋ Add to collection</button>
      <button class="detail-btn" onclick="copyPath('${f.path.replace(/'/g,"\\'")}')">Copy path</button>
    </div>`;
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  document.querySelectorAll('.file-card').forEach(c => c.classList.remove('selected'));
  selectedFile = null;
}

function copyPath(path) {
  navigator.clipboard.writeText(path).catch(() => {});
}

// ── Collections ────────────────────────────────────────────────────────────
function saveCollections() {
  localStorage.setItem('portal_collections', JSON.stringify(collections));
}

function renderCollections() {
  const el = document.getElementById('coll-list');
  el.innerHTML = '';
  const names = Object.keys(collections);
  if (names.length === 0) {
    el.innerHTML = `<div class="coll-empty">No collections yet.<br>Search for files and click <b>+ Collect</b></div>`;
    return;
  }
  names.forEach(name => {
    const c = collections[name];
    const div = document.createElement('div');
    div.className = 'coll-item' + (activeCollection === name ? ' active' : '');
    div.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div class="coll-item-name">📂 ${name}</div>
        <button class="icon-btn" style="padding:2px 6px;font-size:11px" onclick="deleteCollection(event,'${name}')">✕</button>
      </div>
      <div class="coll-item-meta">${c.files.length} files</div>`;
    div.onclick = (e) => {
      if (e.target.tagName === 'BUTTON') return;
      activeCollection = activeCollection === name ? null : name;
      switchTab('collections');
      renderCollections();
      applyFilters();
    };
    el.appendChild(div);
  });
}

function openModal() {
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(() => document.getElementById('coll-name-input').focus(), 50);
}
function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
  document.getElementById('coll-name-input').value = '';
}
function createCollection() {
  const name = document.getElementById('coll-name-input').value.trim();
  if (!name) return;
  collections[name] = { files: [], created: new Date().toISOString() };
  saveCollections();
  renderCollections();
  closeModal();
}

function openAddModal(f) {
  pendingAddFile = f;
  const el = document.getElementById('add-coll-list');
  el.innerHTML = '';
  const names = Object.keys(collections);
  if (names.length === 0) {
    el.innerHTML = `<div class="coll-empty">No collections yet. Create one first.</div>`;
  } else {
    names.forEach(name => {
      const already = collections[name].files.includes(f.path);
      const div = document.createElement('div');
      div.className = 'coll-item';
      div.style.cursor = already ? 'default' : 'pointer';
      div.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div class="coll-item-name">📂 ${name}</div>
          <span style="font-size:11px;color:var(--${already?'green':'muted'})">${already?'✓ Added':'+ Add'}</span>
        </div>`;
      if (!already) div.onclick = () => addToCollection(name, f);
      el.appendChild(div);
    });
  }
  document.getElementById('add-modal-bg').classList.add('open');
}

function closeAddModal() {
  document.getElementById('add-modal-bg').classList.remove('open');
  pendingAddFile = null;
}

function addToCollection(name, f) {
  if (!collections[name].files.includes(f.path)) {
    collections[name].files.push(f.path);
    saveCollections();
  }
  closeAddModal();
  renderCollections();
  // refresh cards to show green border
  applyFilters();
}

function deleteCollection(e, name) {
  e.stopPropagation();
  if (!confirm(`Delete collection "${name}"?`)) return;
  delete collections[name];
  if (activeCollection === name) activeCollection = null;
  saveCollections();
  renderCollections();
  applyFilters();
}

// ── View toggle ────────────────────────────────────────────────────────────
function setView(v) {
  currentView = v;
  document.getElementById('btn-list').classList.toggle('active', v === 'list');
  document.getElementById('btn-grid').classList.toggle('active', v === 'grid');
  const list = document.getElementById('file-list');
  if (v === 'grid') {
    list.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px';
  } else {
    list.style.cssText = '';
  }
}

// ── Sidebar tabs ───────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.sidebar-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  document.getElementById('tab-filters').style.display = tab === 'filters' ? '' : 'none';
  document.getElementById('tab-folders').style.display = tab === 'folders' ? '' : 'none';
  document.getElementById('tab-collections').style.display = tab === 'collections' ? '' : 'none';
}

// ── Keyboard ───────────────────────────────────────────────────────────────
function setupKeyboard() {
  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement !== document.getElementById('search')) {
      e.preventDefault();
      document.getElementById('search').focus();
    }
    if (e.key === 'Escape') {
      closeDetail();
      closeModal();
      closeAddModal();
    }
  });

  document.getElementById('search').addEventListener('input', debounce(applyFilters, 180));

  document.getElementById('coll-name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') createCollection();
  });

  document.getElementById('modal-bg').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-bg')) closeModal();
  });
  document.getElementById('add-modal-bg').addEventListener('click', e => {
    if (e.target === document.getElementById('add-modal-bg')) closeAddModal();
  });
}

// ── Utilities ──────────────────────────────────────────────────────────────
function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

function fmtSize(n) {
  const units = ['B','KB','MB','GB','TB'];
  let i = 0;
  while (n >= 1024 && i < units.length-1) { n /= 1024; i++; }
  return n.toFixed(1) + ' ' + units[i];
}

// ── Boot ───────────────────────────────────────────────────────────────────
init();
</script>
